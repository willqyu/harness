<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>harness · fleet</title>
    <style>
      :root {
        --bg: #0d1117; --panel: #161b22; --border: #30363d; --fg: #e6edf3;
        --muted: #8b949e; --accent: #58a6ff;
        --ok: #3fb950; --run: #d29922; --fail: #f85149; --pending: #6e7681;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--fg);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      header {
        display: flex; align-items: baseline; gap: 16px;
        padding: 16px 24px; border-bottom: 1px solid var(--border);
      }
      header h1 { font-size: 16px; margin: 0; letter-spacing: 0.5px; }
      header .repo { color: var(--muted); font-size: 12px; }
      header .dot { margin-left: auto; color: var(--muted); font-size: 12px; }
      main { padding: 24px; display: grid; gap: 24px; max-width: 1100px; }
      .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
      .panel h2 {
        font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
        color: var(--muted); margin: 0; padding: 12px 16px; border-bottom: 1px solid var(--border);
      }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 8px 16px; border-bottom: 1px solid var(--border); }
      th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; }
      tr:last-child td { border-bottom: none; }
      .empty { padding: 16px; color: var(--muted); }
      .badge {
        display: inline-block; padding: 1px 8px; border-radius: 10px;
        font-size: 11px; font-weight: 700; text-transform: uppercase;
      }
      .s-completed, .s-merged, .s-resolved, .s-true { background: rgba(63,185,80,.15); color: var(--ok); }
      .s-running { background: rgba(210,153,34,.15); color: var(--run); }
      .s-failed, .s-conflict, .s-test-failed, .s-escalated, .s-false { background: rgba(248,81,73,.15); color: var(--fail); }
      .s-pending { background: rgba(110,118,129,.2); color: var(--pending); }
      .sha { color: var(--accent); }
      .muted { color: var(--muted); }
      .pill-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; }
      .kpi { display: flex; gap: 24px; padding: 16px; }
      .kpi div { display: flex; flex-direction: column; }
      .kpi b { font-size: 22px; }
      .kpi span { color: var(--muted); font-size: 11px; text-transform: uppercase; }
      .ctrl { display: flex; gap: 6px; align-items: center; }
      .ctrl input {
        flex: 1; min-width: 120px; background: var(--bg); color: var(--fg);
        border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px;
        font: inherit; font-size: 12px;
      }
      .ctrl button {
        background: var(--bg); color: var(--fg); border: 1px solid var(--border);
        border-radius: 6px; padding: 4px 10px; font: inherit; font-size: 12px; cursor: pointer;
      }
      .ctrl button:hover { border-color: var(--accent); color: var(--accent); }
      .ctrl button.paused { color: var(--run); border-color: var(--run); }
      .exp { cursor: pointer; user-select: none; }
      .exp:hover { color: var(--accent); }
      .caret { display: inline-block; width: 14px; color: var(--muted); }
      tr.detail > td { padding: 0; background: var(--bg); }
      .transcript {
        max-height: 380px; overflow: auto; padding: 10px 16px;
        font-size: 12px; line-height: 1.55; border-top: 1px solid var(--border);
      }
      .ev { margin: 0 0 9px; white-space: pre-wrap; word-break: break-word; }
      .ev:last-child { margin-bottom: 0; }
      .tlabel {
        font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
        color: var(--muted); opacity: 0.55; margin-right: 7px; vertical-align: 1px;
      }
      .ev-thinking { color: var(--muted); font-style: italic; }
      .ev-text { color: var(--fg); }
      .ev-tool { color: var(--accent); }
      .ev-user { color: var(--run); }
      .transcript .loading { color: var(--muted); padding: 6px 0; }
      .action-bar { display: flex; gap: 8px; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
      .action-bar input, .spawn textarea {
        background: var(--bg); color: var(--fg); border: 1px solid var(--border);
        border-radius: 6px; padding: 6px 10px; font: inherit; font-size: 12px;
      }
      .action-bar input { flex: 1; min-width: 200px; }
      .action-bar button {
        background: var(--bg); color: var(--fg); border: 1px solid var(--border);
        border-radius: 6px; padding: 6px 14px; font: inherit; font-size: 12px; cursor: pointer; white-space: nowrap;
      }
      .action-bar button:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
      .action-bar button:disabled { opacity: 0.5; cursor: default; }
      #integrate-btn.go { border-color: var(--ok); color: var(--ok); }
      .spawn { padding: 12px 16px; display: grid; gap: 10px; }
      .spawn textarea { width: 100%; resize: vertical; line-height: 1.5; }
      .rec {
        margin: 12px 16px 0; padding: 10px 12px; border-radius: 6px;
        background: rgba(63,185,80,.12); border: 1px solid rgba(63,185,80,.45); color: var(--ok);
        font-size: 12px; display: flex; align-items: center; gap: 8px;
      }
      .rec b { color: var(--fg); }
    </style>
  </head>
  <body>
    <header>
      <h1>⛓ harness</h1>
      <span class="repo" id="repo">—</span>
      <span class="dot" id="updated">connecting…</span>
    </header>
    <main>
      <section class="panel">
        <h2>Integration → main</h2>
        <div id="integrate-rec"></div>
        <div class="action-bar">
          <input id="integrate-test" type="text" placeholder="test gate (optional), e.g. cd frontend && npx tsc -b" />
          <button id="integrate-btn">Integrate completed branches</button>
          <span id="integrate-msg" class="muted"></span>
        </div>
        <div id="integration"><div class="empty">No integration run yet.</div></div>
      </section>

      <section class="panel">
        <h2>Workers</h2>
        <div id="workers"><div class="empty">No workers yet.</div></div>
      </section>

      <section class="panel">
        <h2>Spawn worker</h2>
        <div class="spawn">
          <textarea id="spawn-desc" rows="3" placeholder="Describe the task for a new agent — it gets its own branch + worktree and starts immediately…"></textarea>
          <div class="action-bar">
            <input id="spawn-branch" type="text" placeholder="branch name (optional — auto if blank)" />
            <button id="spawn-btn">Spawn worker</button>
            <span id="spawn-msg" class="muted"></span>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>Active worktrees</h2>
        <div id="worktrees"><div class="empty">—</div></div>
      </section>

      <section class="panel">
        <h2>Checkpoints</h2>
        <div id="checkpoints"><div class="empty">—</div></div>
      </section>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
      const short = (sha) => (sha ? esc(String(sha).slice(0, 8)) : "—");
      const badge = (s) => `<span class="badge s-${esc(s)}">${esc(s)}</span>`;

      function controlsCell(w, inbox) {
        if (w.state !== "running") return '<span class="muted">—</span>';
        const paused = inbox && inbox[w.branch] && inbox[w.branch].paused;
        const b = esc(w.branch);
        return `<div class="ctrl" data-branch="${b}">
            <input type="text" placeholder="message this agent…" data-role="inject-text" />
            <button data-act="inject">Send</button>
            <button data-act="${paused ? "resume" : "pause"}" class="${paused ? "paused" : ""}">${paused ? "Resume" : "Pause"}</button>
          </div>`;
      }

      // Expanded transcript panels (per branch) + their accumulated state.
      const expanded = new Set();
      const logs = new Map(); // branch -> { offset, html }

      function renderEvent(e) {
        return `<div class="ev ev-${esc(e.kind)}"><span class="tlabel">${esc(e.kind)}</span>${esc(e.text)}</div>`;
      }

      function renderWorkers(workers, inbox) {
        if (!workers.length) return '<div class="empty">No workers yet.</div>';
        const rows = workers.map((w) => {
          const b = esc(w.branch);
          const open = expanded.has(w.branch);
          const paused = inbox && inbox[w.branch] && inbox[w.branch].paused;
          const summary = `
            <tr>
              <td><span class="exp" data-act="toggle" data-branch="${b}"><span class="caret">${open ? "▾" : "▸"}</span>${esc(w.branch)}</span>${paused ? " " + badge("paused") : ""}</td>
              <td class="muted">${esc(w.taskId)}</td>
              <td>${badge(w.state)}</td>
              <td class="sha">${short(w.head)}</td>
              <td class="muted">${w.checkpoint ? "✓" : "—"}</td>
              <td>${controlsCell(w, inbox)}</td>
            </tr>`;
          if (!open) return summary;
          const html = (logs.get(w.branch) || {}).html || '<div class="loading">loading transcript…</div>';
          return summary + `<tr class="detail"><td colspan="6"><div class="transcript" data-branch="${b}">${html}</div></td></tr>`;
        }).join("");
        return `<table><thead><tr><th>Branch</th><th>Task</th><th>State</th><th>Head</th><th>Ckpt</th><th>Steer</th></tr></thead><tbody>${rows}</tbody></table>`;
      }

      async function pollLog(branch) {
        if (!expanded.has(branch)) return;
        const st = logs.get(branch) || { offset: 0, html: "" };
        try {
          const r = await fetch(`/api/log?branch=${encodeURIComponent(branch)}&offset=${st.offset}`);
          const c = await r.json();
          if (typeof c.offset === "number") st.offset = c.offset;
          if (c.events && c.events.length) {
            if (st.html.indexOf("loading transcript") >= 0) st.html = "";
            st.html += c.events.map(renderEvent).join("");
          } else if (!st.html) {
            st.html = '<div class="loading">no transcript yet for this agent.</div>';
          }
          logs.set(branch, st);
          const panel = document.querySelector(`.transcript[data-branch="${CSS.escape(branch)}"]`);
          if (panel) {
            const atBottom = panel.scrollHeight - panel.scrollTop - panel.clientHeight < 48;
            panel.innerHTML = st.html;
            if (atBottom) panel.scrollTop = panel.scrollHeight;
          }
        } catch (e) { /* transient */ }
        if (expanded.has(branch)) setTimeout(() => pollLog(branch), 1500);
      }

      async function postJSON(path, body) {
        try {
          await fetch(path, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) });
        } catch (e) { /* shown as disconnected on next tick */ }
      }

      // Expand/collapse a worker row to stream its agent transcript.
      document.addEventListener("click", (ev) => {
        const tog = ev.target.closest('[data-act="toggle"]');
        if (!tog) return;
        const branch = tog.dataset.branch;
        if (expanded.has(branch)) {
          expanded.delete(branch);
        } else {
          expanded.add(branch);
          if (!logs.has(branch)) logs.set(branch, { offset: 0, html: "" });
          pollLog(branch);
        }
        tick();
      });

      // Event delegation for the per-agent steer controls.
      document.addEventListener("click", (ev) => {
        const btn = ev.target.closest("button[data-act]");
        if (!btn) return;
        const wrap = btn.closest(".ctrl");
        const branch = wrap.dataset.branch;
        const act = btn.dataset.act;
        if (act === "inject") {
          const input = wrap.querySelector('[data-role="inject-text"]');
          const text = input.value.trim();
          if (text) { postJSON("/api/inject", { branch, text }); input.value = ""; }
        } else {
          postJSON("/api/control", { branch, action: act });
        }
      });
      document.addEventListener("keydown", (ev) => {
        if (ev.key !== "Enter") return;
        const input = ev.target.closest('[data-role="inject-text"]');
        if (!input) return;
        const wrap = input.closest(".ctrl");
        const text = input.value.trim();
        if (text) { postJSON("/api/inject", { branch: wrap.dataset.branch, text }); input.value = ""; }
      });

      // POST returning parsed JSON; throws on non-2xx with the server message.
      async function api(path, body) {
        const r = await fetch(path, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body || {}) });
        let j = {}; try { j = await r.json(); } catch (e) {}
        if (!r.ok) throw new Error(j.error || ("HTTP " + r.status));
        return j;
      }

      $("integrate-btn").addEventListener("click", async () => {
        const btn = $("integrate-btn");
        const test = $("integrate-test").value.trim();
        btn.disabled = true; $("integrate-msg").textContent = "starting…";
        try {
          await api("/api/integrate", { test });
          $("integrate-msg").textContent = "integration started — watch the panel below.";
        } catch (e) {
          $("integrate-msg").textContent = "✗ " + e.message;
        } finally {
          setTimeout(() => { btn.disabled = false; }, 1500);
          tick();
        }
      });

      $("spawn-btn").addEventListener("click", async () => {
        const desc = $("spawn-desc").value.trim();
        const branch = $("spawn-branch").value.trim();
        if (!desc) { $("spawn-msg").textContent = "describe a task first"; return; }
        const btn = $("spawn-btn");
        btn.disabled = true; $("spawn-msg").textContent = "spawning…";
        try {
          const j = await api("/api/spawn", { description: desc, branch });
          $("spawn-msg").textContent = "✓ spawned " + j.branch;
          $("spawn-desc").value = ""; $("spawn-branch").value = "";
        } catch (e) {
          $("spawn-msg").textContent = "✗ " + e.message;
        } finally {
          btn.disabled = false;
          setTimeout(tick, 800);
        }
      });

      // Recommend integration once every worker is terminal and there are
      // completed branches not yet folded into main.
      function renderRecommend(s) {
        const rec = $("integrate-rec");
        const btn = $("integrate-btn");
        const workers = s.workers || [];
        if (s.integrating) {
          rec.innerHTML = "";
          btn.disabled = true; btn.classList.remove("go");
          btn.textContent = "Integrating…";
          return;
        }
        btn.disabled = false; btn.textContent = "Integrate completed branches";
        const completed = workers.filter((w) => w.state === "completed");
        const allTerminal = workers.length > 0 && workers.every((w) => w.state === "completed" || w.state === "failed");
        const done = new Set(((s.integration && s.integration.steps) || [])
          .filter((st) => ["merged", "resolved", "ok", "promoted"].includes(String(st.status)))
          .map((st) => st.branch));
        const pending = completed.filter((w) => !done.has(w.branch));
        if (allTerminal && pending.length > 0) {
          rec.innerHTML = `<div class="rec">▲ <b>${pending.length}</b> branch${pending.length !== 1 ? "es" : ""} finished and ready to integrate into main — ${pending.map((w) => esc(w.branch)).join(", ")}</div>`;
          btn.classList.add("go");
        } else {
          rec.innerHTML = "";
          btn.classList.remove("go");
        }
      }

      function renderIntegration(it) {
        if (!it) return '<div class="empty">No integration run yet.</div>';
        const steps = (it.steps || []).map((s) => `
          <tr><td>${esc(s.branch)}</td><td>${badge(s.status)}</td><td class="muted">${esc(s.detail || "")}</td></tr>`).join("");
        const kpi = `
          <div class="kpi">
            <div><b>${badge(String(it.promoted))}</b><span>promoted</span></div>
            <div><b class="sha">${short(it.mainHead)}</b><span>main head</span></div>
            <div><b>${(it.steps || []).length}</b><span>branches</span></div>
            <div><b class="muted" style="font-size:12px">${esc((it.updatedAt || "").replace("T", " ").slice(0, 19))}</b><span>updated</span></div>
          </div>`;
        const table = steps
          ? `<table><thead><tr><th>Branch</th><th>Result</th><th>Detail</th></tr></thead><tbody>${steps}</tbody></table>`
          : "";
        const warn = it.warning
          ? `<div class="rec" style="background:rgba(248,81,73,.12);border-color:rgba(248,81,73,.5);color:var(--fail)">⚠ ${esc(it.warning)}</div>`
          : "";
        return kpi + warn + table;
      }

      function renderWorktrees(wts) {
        if (!wts.length) return '<div class="empty">—</div>';
        return `<div class="pill-row">${wts
          .map((w) => `<span class="badge s-pending">${esc(w.branch || "(detached)")}</span>`)
          .join("")}</div>`;
      }

      function renderCheckpoints(cps) {
        if (!cps.length) return '<div class="empty">—</div>';
        const rows = cps.map((c) => `
          <tr><td>${esc(c.branch)}</td><td class="sha">${short(c.head)}</td><td class="muted">${esc(c.context || "").slice(0, 80)}</td></tr>`).join("");
        return `<table><thead><tr><th>Branch</th><th>Head</th><th>Context</th></tr></thead><tbody>${rows}</tbody></table>`;
      }

      async function tick() {
        try {
          const r = await fetch("/api/status");
          const s = await r.json();
          $("repo").textContent = s.repoRoot;
          $("updated").textContent = "updated " + new Date(s.generatedAt).toLocaleTimeString();
          $("integration").innerHTML = renderIntegration(s.integration);
          renderRecommend(s);

          // Preserve a half-typed message across the refresh.
          const focused = document.activeElement;
          const typing = focused && focused.matches('[data-role="inject-text"]')
            ? { branch: focused.closest(".ctrl").dataset.branch, value: focused.value, start: focused.selectionStart }
            : null;
          // Preserve transcript scroll (and stick-to-bottom) across the refresh.
          const scrolls = {};
          document.querySelectorAll(".transcript[data-branch]").forEach((p) => {
            scrolls[p.dataset.branch] = { top: p.scrollTop, atBottom: p.scrollHeight - p.scrollTop - p.clientHeight < 48 };
          });
          $("workers").innerHTML = renderWorkers(s.workers || [], s.inbox || {});
          document.querySelectorAll(".transcript[data-branch]").forEach((p) => {
            const sv = scrolls[p.dataset.branch];
            if (sv) p.scrollTop = sv.atBottom ? p.scrollHeight : sv.top;
          });
          if (typing) {
            const sel = document.querySelector(`.ctrl[data-branch="${CSS.escape(typing.branch)}"] [data-role="inject-text"]`);
            if (sel) { sel.value = typing.value; sel.focus(); try { sel.setSelectionRange(typing.start, typing.start); } catch (e) {} }
          }
          $("worktrees").innerHTML = renderWorktrees(s.worktrees || []);
          $("checkpoints").innerHTML = renderCheckpoints(s.checkpoints || []);
        } catch (e) {
          $("updated").textContent = "disconnected";
        }
      }
      tick();
      setInterval(tick, 2000);
    </script>
  </body>
</html>
